name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    name: Validate ChangeForge Contracts
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show Python version
        run: python3 --version

      - name: Validate authoring contracts
        run: |
          python3 scripts/validate-skills.py
          python3 scripts/validate-capabilities.py
          python3 scripts/validate-domain-extensions.py
          python3 scripts/validate-registry.py
          python3 scripts/validate-skill-body-links.py
          python3 scripts/eval-routing.py
          python3 scripts/validate-codegen-benchmarks.py
          python3 scripts/run-codegen-benchmarks.py --limit 3

      - name: Build runtime profiles
        run: |
          python3 scripts/build.py --profile recommended
          python3 scripts/build.py --profile full
          python3 scripts/build.py --profile dev

      - name: Validate installation artifacts
        run: python3 scripts/validate-installation.py