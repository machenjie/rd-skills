---
schema_version: 1
kind: changeforge.routing_rules
description: Runtime routing rules for professional ChangeForge skills and foundation capabilities.
supported_change_types:
  - new feature
  - feature modification
  - bug fix
  - refactor
  - API change
  - data model change
  - database migration
  - frontend change
  - backend change
  - integration change
  - dependency upgrade
  - security fix
  - performance optimization
  - reliability improvement
  - observability change
  - deployment change
  - configuration change
  - documentation change
  - code review
  - test generation
runtime_profiles:
  - name: recommended
    top_level: 19 professional skills
    foundation_mode: 96 foundation capabilities compiled into professional references
    domain_extension_mode: router index only
  - name: full
    top_level: 19 professional skills and 7 domain extensions
    foundation_mode: 96 foundation capabilities compiled into professional references
    domain_extension_mode: top-level runtime skills
  - name: dev
    top_level: 19 professional skills, 96 foundation capabilities, and 7 domain extensions
    foundation_mode: top-level and compiled professional references
    domain_extension_mode: top-level runtime skills
complexity_rules:
  - level: L1
    name: isolated local change
    rule: Use only relevant builder, review, or test skills; add intake or acceptance only when unclear or untestable.
    minimum_path: targeted builder or gate
  - level: L2
    name: single-module change
    rule: Include intake, impact when blast radius is uncertain, acceptance, implementation, and test.
    minimum_path: intake, acceptance, implementation, test
  - level: L3
    name: multi-module product change
    rule: Include intake, impact, domain or architecture if affected, data/API if affected, implementation, security if needed, tests, and docs.
    minimum_path: intake, impact, acceptance, affected design skills, implementation, tests, docs
  - level: L4
    name: product-grade high-risk change
    rule: Include the full relevant path and all quality gates touched by risk and impact.
    minimum_path: intake, impact, acceptance, design, implementation, security, reliability, delivery, tests, docs, review when needed
  - level: L5
    name: regulated financial Web3 AI migration or production-critical change
    rule: Include matching domain extension, security, reliability, delivery, rollback, documentation, and evidence requirements.
    minimum_path: full relevant path with domain extension and explicit rollback
risk_escalation_triggers:
  - auth
  - authorization
  - object-level permission
  - payment
  - subscription
  - billing
  - wallet
  - private key
  - Web3 asset
  - user data
  - PII
  - file upload
  - AI prompt
  - RAG
  - external integration
  - webhook
  - database migration
  - production deployment
  - secret/config change
  - dependency upgrade with security impact
  - irreversible data operation
failure_routing:
  - condition: unclear requirement
    route_to: change-intake-compiler
  - condition: unknown blast radius
    route_to: change-impact-analyzer
  - condition: untestable done state
    route_to: acceptance-criteria-builder
  - condition: task too large
    route_to: task-dag-planner
  - condition: broken user flow
    route_to: experience-impact-modeler
  - condition: wrong business behavior
    route_to: domain-impact-modeler
  - condition: architecture drift
    route_to: architecture-impact-reviewer
  - condition: contract or schema mismatch
    route_to: data-api-contract-changer
  - condition: frontend issue
    route_to: frontend-change-builder
  - condition: backend issue
    route_to: backend-change-builder
  - condition: data cache queue search or storage issue
    route_to: data-middleware-change-builder
  - condition: external integration issue
    route_to: integration-change-builder
  - condition: failed tests
    route_to: quality-test-gate
  - condition: security issue
    route_to: security-privacy-gate
  - condition: reliability or performance issue
    route_to: reliability-observability-gate
  - condition: deployment issue
    route_to: delivery-release-gate
  - condition: AI code quality issue
    route_to: ai-code-review-refactor
  - condition: stale docs
    route_to: change-documentation-gate
domain_extension_signals:
