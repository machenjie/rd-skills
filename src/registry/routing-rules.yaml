  - configuration change
  - documentation change
  - code review
  - test generation
runtime_profiles:
  - name: recommended
    top_level: 19 professional skills
    foundation_mode: 105 foundation capabilities compiled into professional references
    domain_extension_mode: router index only
  - name: full
    top_level: 19 professional skills and 7 domain extensions
    foundation_mode: 105 foundation capabilities compiled into professional references
    domain_extension_mode: top-level runtime skills
  - name: dev
    top_level: 19 professional skills, 105 foundation capabilities, and 7 domain extensions
    foundation_mode: top-level and compiled professional references
    domain_extension_mode: top-level runtime skills
complexity_rules:
  - level: L1
    name: isolated local change
    rule: Use only relevant builder, review, or test skills; add intake or acceptance only when unclear or untestable.
    minimum_path: targeted builder or gate
  - level: L2
    name: single-module change
    rule: Include intake, impact when blast radius is uncertain, acceptance, implementation, and test.
    minimum_path: intake, acceptance, implementation, test
  - level: L3
    name: multi-module product change
    rule: Include intake, impact, domain or architecture if affected, data/API if affected, implementation, security if needed, tests, and docs.
    minimum_path: intake, impact, acceptance, affected design skills, implementation, tests, docs
  - level: L4
    name: product-grade high-risk change
    rule: Include the full relevant path and all quality gates touched by risk and impact.
    minimum_path: intake, impact, acceptance, design, implementation, security, reliability, delivery, tests, docs, review when needed
  - level: L5
    name: regulated financial Web3 AI migration or production-critical change
    rule: Include matching domain extension, security, reliability, delivery, rollback, documentation, and evidence requirements.
    minimum_path: full relevant path with domain extension and explicit rollback
