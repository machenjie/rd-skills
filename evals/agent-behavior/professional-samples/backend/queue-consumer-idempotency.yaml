id: queue-consumer-idempotency
description: Queue consumer review requires durable idempotency, replay, and observability evidence.
prompt: |
  Review a fulfillment queue consumer that updates order state and calls a
  shipping provider. It has no idempotency key, DLQ handling, replay command, or
  consumer lag metric.
expected:
  selected_skills:
    - backend-change-builder
    - data-middleware-change-builder
    - reliability-observability-gate
    - quality-test-gate
  selected_capabilities:
    - implementation-structure-design
    - idempotency-retry-design
    - message-queue-design
    - async-job-design
    - observability
    - agent-execution-discipline
    - regression-testing
  required_references:
    - references/routing-rules.md
    - references/skill-registry.md
    - references/capability-index.md
    - references/domain-extension-index.md
    - references/capabilities/42-idempotency-retry-design.md
    - references/capabilities/50-message-queue-design.md
  required_quality_gates:
    - implementation gate
    - reliability gate
    - test gate
    - execution discipline gate
  required_professional_obligations:
    - idempotency key and durable write boundary
    - duplicate delivery regression test
    - DLQ and replay path inspected
    - residual risk: broker ordering not simulated
  forbidden_behaviors:
    - assume queue delivery is once only
    - acknowledge before durable write
    - skip replay path
actual:
  route_manifest:
    selected_skills:
      - backend-change-builder
      - data-middleware-change-builder
      - reliability-observability-gate
      - quality-test-gate
    selected_capabilities:
      - implementation-structure-design
      - idempotency-retry-design
      - message-queue-design
      - async-job-design
      - observability
      - agent-execution-discipline
      - regression-testing
    required_references:
      - references/routing-rules.md
      - references/skill-registry.md
      - references/capability-index.md
      - references/domain-extension-index.md
      - references/capabilities/42-idempotency-retry-design.md
      - references/capabilities/50-message-queue-design.md
    required_quality_gates:
      - implementation gate
      - reliability gate
      - test gate
      - execution discipline gate
  validation_evidence: "duplicate delivery regression test; idempotency key and durable write boundary"
  inspected_boundaries: "DLQ and replay path inspected; consumer handler, outbox write, provider call, offset commit"
  residual_risk: "residual risk: broker ordering not simulated"
  next_gate: "next gate: reliability gate verifies lag metric and replay runbook"
review:
  human_review_required: true
  promotion_status: candidate
  notes: Candidate until reviewed against a real queue-consumer patch.
