id: caller-callee-test-impact-map
category: repo-intel
complexity: L4
focus:
  - repository graph context pack
  - caller callee impact mapping
  - test ownership selection
  - freshness and residual risk
route_hints:
  skills:
    - backend-change-builder
    - ai-code-review-refactor
    - quality-test-gate
  capabilities:
    - agent-execution-discipline
    - implementation-structure-design
    - code-review
    - unit-testing
    - regression-testing
  domain_extensions: []
  quality_gates:
    - implementation gate
    - test gate
    - AI review gate
    - execution discipline gate
expected_outcomes:
  - The plan cites concrete graph evidence.
  - Validation commands cover affected tests.
  - Graph freshness is stated.
  - Residual risk is tied to remaining graph uncertainty.
required_qualities:
  - Evidence is explicit and machine-inspectable rather than inferred from a polished answer.
  - Route, process, validation, or review decisions are tied to the concrete benchmark case.
  - Validation evidence and residual risk are both present in final handoff artifacts.
  - Bounded telemetry is separated from assertion-backed quality evidence.
forbidden_shortcuts:
  - Claiming capability coverage from telemetry-only diagnostics.
  - Treating inferred or fallback process language as explicit compliance.
  - Lowering security, validation, accessibility, or error-handling expectations to keep the change small.
  - Claiming cost reduction or efficiency improvement during this quality-first benchmark phase.
evidence:
  - Candidate artifact containing capability-specific assertion terms.
  - Validation command or explicit residual-risk statement.
  - Final handoff listing changed files or evidence files.
  - Absence of raw prompts, secrets, full command output, and local absolute user paths.
