  skills: [quality-test-gate]
  capabilities: [context-control-plane, agent-tool-permission-sandbox, validation-broker, repository-graph-analysis, plan-execution-consistency, agent-execution-discipline]
  domain_extensions: []
  quality_gates: [security gate, test gate, execution discipline gate]
forbidden:
  skills: [backend-change-builder, frontend-change-builder, delivery-release-gate]
  capabilities: [release-rollback, service-business-logic]
  domain_extensions: [ai-product-extension, web3-product-extension, payment-trading-extension]
  quality_gates: [delivery gate]
notes: |
