---
id: l3-webhook-signature-verification
description: |
  Add HMAC signature verification and replay protection to an inbound
  third-party webhook handler.
prompt: |
  Inbound webhooks from the shipping provider currently accept any POST.
  Add HMAC-SHA256 signature verification using the provider's signing
  secret, plus timestamp-based replay protection (5 minute window) and
  idempotent processing keyed on the provider's event id.
