---
id: payment-idempotency
description: |
  Payment creation endpoint must become idempotent and auditable across
  provider retries and client retries.
prompt: |
  Make POST /payments idempotent. Clients send an Idempotency-Key, provider
  retries may arrive out of order, duplicate charges must never be created,
  and the ledger/audit trail must show the final payment state.
