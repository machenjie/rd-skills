---
id: l5-web3-payment-ai-subscription
description: |
  Use an AI agent to approve recurring wallet-based subscription payments
  with on-chain settlement. Combines Web3, payment, and AI risk surfaces
  and demands all three domain extensions plus full quality gates.
prompt: |
  Build a subscription product where users authorize recurring payments
  from a self-custodied wallet. An LLM-driven agent evaluates each
  upcoming charge against user-defined rules and either approves the
  on-chain transfer or pauses the subscription. Include idempotent
  payment state machine, signature verification, key-boundary review,
  AI side-effect controls, audit trail, and rollback.
