---
id: webhook-signature-replay-hidden-risk
description: |
  Webhook handler must route raw-body signature verification and replay
  protection before state mutation.
prompt: |
  Review a subscription webhook handler. It parses JSON first, then updates
  subscription state. Signature verification and event replay dedupe are not
  implemented because the provider retries failed deliveries.
expected:
  complexity: L3
  risk_level: high
  expected_stage: code-review
  expected_context_budget_mode: staged-plan
  risk_triggers:
