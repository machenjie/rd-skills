id: l4-db-migration-api-compat
description: |
  Split a column in a high-volume table while keeping existing API
  clients working. Requires expand-contract migration, read/write
  compatibility, rollback plan, and staged deployment.
prompt: |
  Split customer_name into first_name and last_name in the customers
  table (10M+ rows). Existing API clients must continue to send and
  receive customer_name without breaking; new clients can use the split
  fields. Plan migration, backfill, dual-write, cutover, and rollback.
