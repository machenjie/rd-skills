id: typescript-any-api-boundary-hidden-risk
description: |
  TypeScript `any` at an API boundary requires runtime validation and type
  boundary evidence.
prompt: |
  A TypeScript client parses `/accounts` API JSON as `any`, casts it to
  `Account`, and then assumes `status` is non-null. There is no runtime schema,
  no discriminated error state, and no generated-client compatibility check.
