---
id: helm-chart-secret-values
description: |
  Helm chart values contain secret-like fields and require secure release gates.
prompt: |
  Update the Helm chart for the payment service. values-prod.yaml currently includes API tokens and database passwords. Add values.schema.json, helm lint/template checks, ExternalSecrets, helm diff, and atomic upgrade.
expected:
  complexity: L4
  risk_level: high
  expected_stage: release-delivery
  expected_context_budget_mode: staged-plan
  risk_triggers:
    - secret/config change
    - production deployment
  skills:
    - delivery-release-gate
    - security-privacy-gate
    - quality-test-gate
  capabilities:
    - kubernetes-gateway
    - ci-cd
    - secret-configuration-security
    - containerization
    - release-rollback
  domain_extensions: []
  quality_gates:
    - security gate
    - delivery gate
    - test gate
forbidden:
  skills:
    - frontend-change-builder
    - data-api-contract-changer
  domain_extensions:
    - bigdata-product-extension
    - web3-product-extension
notes: |
  Helm chart and values changes must route to Kubernetes, CI/CD, secrets, release and security gates.
