    - domain-logic-implementation
    - unit-testing
  domain_extensions: []
  quality_gates:
    - implementation gate
    - test gate
forbidden:
  skills:
    - frontend-change-builder
    - data-api-contract-changer
    - delivery-release-gate
  capabilities:
