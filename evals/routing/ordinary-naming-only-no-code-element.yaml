  risk_level: low
  expected_stage: implementation-planning
  expected_context_budget_mode: single-stage
  risk_triggers: []
  skills:
    - quality-test-gate
  capabilities: []
  domain_extensions: []
  quality_gates:
    - test gate
forbidden:
  skills:
    - backend-change-builder
    - frontend-change-builder
    - security-privacy-gate
    - architecture-impact-reviewer
    - delivery-release-gate
  capabilities:
    - code-element-professionalism
    - implementation-structure-design
    - data-side-effect-flow-tracing
    - transaction-consistency
    - language-idiom-enforcement
  domain_extensions:
    - ai-product-extension
    - web3-product-extension
