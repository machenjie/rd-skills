  skills: [change-impact-analyzer, task-dag-planner, quality-test-gate]
  capabilities: [repository-graph-analysis, repository-context-map, context-packaging, context-control-plane, implementation-structure-design, plan-execution-consistency]
  domain_extensions: []
  quality_gates: [impact gate, SDD gate, implementation gate]
forbidden:
  skills: [backend-change-builder, frontend-change-builder, delivery-release-gate]
  capabilities: [release-rollback, project-memory-governance]
  domain_extensions: [ai-product-extension, web3-product-extension, payment-trading-extension]
