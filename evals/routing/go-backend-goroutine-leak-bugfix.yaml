---
id: go-backend-goroutine-leak-bugfix
description: |
  A Go backend bug fix for a leaked goroutine caused by a missing context
  cancellation. Stage-aware bug-fix routing that must select the Go language
  capability and require a same-pattern scan and regression test, without
  escalating to API, data, security, or release gates.
prompt: |
  A Go service leaks goroutines under load: handleSubscribe spawns a worker
  goroutine that ranges over a channel but never returns when the request
  context is cancelled, so each cancelled request leaks one goroutine and a
  connection. Fix the leak by propagating ctx cancellation into the worker,
  add a regression test with the race detector, and check whether the same
  missing-cancellation pattern exists in the other stream handlers.
