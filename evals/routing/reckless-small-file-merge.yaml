id: reckless-small-file-merge
description: |
  A cleanup patch merged small files with real boundaries into a service only
  to reduce file count.
prompt: |
  Review an AI refactor that merged payment_gateway_client.py,
  cancellation_window.py, and cancellation_policy.py into
  OrderCancellationService because they were small. The adapter/client hid
  external payment side effects, the value object carried an invariant, and the
  policy had independent public behavior tests. A tiny private helper used only
  by the service was also present and could have been merged safely.
