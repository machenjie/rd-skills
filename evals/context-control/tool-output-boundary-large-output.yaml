  budget_profile: runtime
  budget_rationale: Testing route needs one bounded validation-output record.
  context_budget_tokens: 700
  selected_capability_count: 6
  selected_reference_count: 4
  skipped_reference_count: 2
  over_budget: false
  residual_context_risk:
