  context_risk: true
  routing_fixture_path: evals/routing/context-control-tool-output-boundary.yaml
  routing_actual_path: evals/routing-outputs/context-control-tool-output-boundary.actual.yaml
  runtime_resolver:
    stage: testing
    risk_surfaces:
      - validation
    product_surfaces: []
    classification:
      stage: testing
      prompt_signals:
        - tool output boundary
        - output truncation
expected:
  context_control_selected: true
  selected_skills:
    - quality-test-gate
  selected_capabilities:
    - context-control-plane
    - agent-tool-permission-sandbox
    - validation-broker
    - repository-graph-analysis
    - plan-execution-consistency
    - agent-execution-discipline
  budget_mode: single-stage
  selected_reference_count: 4
  selected_reference_count_max: 8
  skipped_reference_count: 2
  skipped_references:
    - reference: references/capabilities/65-performance-budgeting.md
      reason: The issue is output size, not runtime performance budget.
    - reference: references/capabilities/75-release-rollback.md
      reason: No release action is in scope.
  safety_result: pass
  closure_result: partial
  forbidden_raw_fields:
    - raw_prompt
    - prompt
    - stdout
    - stderr
    - command_output
    - raw_output
    - full_output
