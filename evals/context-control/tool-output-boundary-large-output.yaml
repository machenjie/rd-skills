tool_output_boundary:
  required: true
  record:
    schema_version: 1
    tool_name: Bash
    event_name: PostToolUse
    output_size_class: large
    output_bytes: 64000
    output_lines: 900
    artifact_path: artifacts/validation/pytest.log
    artifact_path_source: explicit_tool_result
    digest: sha256:aaaaaaaaaaaaaaaaaaaaaaaa
    bounded_summary: pytest failed in validation broker fixture; rerun with redirect for full log
    truncation_advice: rerun_with_redirect
    llm_context_policy: artifact_reference_only
    privacy_status: pass
    unsupported_reason: null
