branch_route_repair_summary:
  required: true
  record:
    schema_version: 1
    summary_id: route-repair-context-control-fixture
    trigger: repeated_same_path_retry
    abandoned_or_repaired_route:
      owner_skill: quality-test-gate
      reviewer_skill: ai-code-review-refactor
      hypothesis: same-path retry was abandoned
      files_touched:
        - scripts/eval-context-control-plane.py
      validation_result: fail:old route
      failure_reason: same-path retry
    reusable_findings:
      - do not retry same path without new route evidence
    forbidden_retries:
      - same-path retry
    new_route:
      owner_skill: quality-test-gate
      selected_capabilities:
        - context-control-plane
        - validation-broker
      validation_plan:
        - python3 scripts/eval-context-control-plane.py
    residual_risk:
      - rerun report consistency after regenerated scorecard
    privacy_status: pass
