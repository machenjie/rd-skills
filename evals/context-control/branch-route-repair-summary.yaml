  context_risk: true
  runtime_resolver:
    stage: code-review
    risk_surfaces:
      - execution-trajectory
    product_surfaces:
      - execution-trajectory
    classification:
      stage: code-review
      prompt_signals:
        - branch route repair summary
        - route repair
expected:
  context_control_selected: true
  selected_skills:
    - ai-code-review-refactor
    - quality-test-gate
  selected_capabilities:
    - context-control-plane
    - agent-execution-discipline
    - plan-execution-consistency
    - execution-trajectory-analysis
  budget_mode: staged-plan
  selected_reference_count: 4
  selected_reference_count_max: 16
  skipped_reference_count: 1
  skipped_references:
    - reference: references/capabilities/75-release-rollback.md
      reason: The route repair is pre-release and does not change deployment state.
  safety_result: pass
  closure_result: partial
  forbidden_raw_fields:
    - raw_prompt
    - prompt
    - stdout
    - stderr
    - command_output
    - raw_output
    - full_output
    - full_diff
