case_id: controller-only-business-rule
prompt: Add a controller check so premium customers can return orders after 45 days.
routing_triggers:
  - business rule hidden in SQL/controller/UI/test
  - business rule authority unknown
source_context:
  files:
    - path: orders/controllers/cancel_order.py
      language: python
      content: |
        def cancel_order(order, actor):
            if order.status == "shipped":
                return error("cannot_cancel")
            order.cancelled_by = actor.id
            return ok(order)
    - path: orders/jobs/import_cancellations.py
      language: python
      content: |
        def import_cancel(order_id):
            order = load_order(order_id)
            order.cancel()
diff_context:
  changed_files:
    - path: orders/controllers/cancel_order.py
      patch: |
        +    if order.customer_tier == "premium" and order.age_days <= 45:
        +        return ok(order.cancel())
expected_route:
  stage: architecture-design
  business_semantic_pack_required: true
  business_semantic_scope: controller-only-rule-authority
expected_capabilities: [business-semantic-control-plane, business-rule-extraction, implementation-structure-design]
expected_quality_gates: [domain gate, architecture gate, test gate]
expected_bsp_sections: [business_objects, business_rules, code_mapping, validation_map]
expected_review_findings:
  - finding_id: BSP-CONTROLLER-ONLY-RULE
    category: controller_only_rule
    impacted_claim: order cancellation after shipped
    expected_evidence:
      - 'if order.status == "shipped": return error("cannot_cancel")'
      - orders/jobs/import_cancellations.py bypass path
    required_fix: controller-only rule can be bypassed by jobs/admin/import path; route to business-rule-extraction and domain enforcement.
forbidden_behavior: [leave rule only in controller, no bypass path scan]
scoring: [rule_authority, placement_precision, bypass_scan, test_mapping]
