id: copilot-pre-tool-supported
runtime: copilot
description: Copilot pre-tool events are supported for decisions while advisory context remains a separate unsupported check.
coverage_targets:
  - event_recognition
  - tool_category
  - privacy_redaction
pressure_cases:
  - copilot_pre_tool_decision_supported
input_payload:
  eventName: PreToolUse
  event_id: copilot-pre-tool-supported
  toolName: RunTerminalCommand
  toolInput:
    command: pytest tests/test_api.py
expected_normalized_event:
  adapter: copilot
  event_kind: pre_tool_use
  tool_category: test
  command_kind: pytest
expected_gate_result:
  outcome: pass
expected_evidence_delta:
  normalized_event_supported: true
  adapter_degradation_strength: none
  validation_strength: weak
  validation_freshness: current
  validation_outcome: no_outcome
  privacy_redaction_count: 1
expected_closure_effect:
  verdict: needs_validation
  unsupported_checks_not_contains:
    - runtime_adapter_degradation
    - pre_tool_advisory_context
privacy_expectations:
  redactions_include:
    - "command:kind_only"
  blocked_strings:
    - pytest tests/test_api.py
  forbid_absolute_paths: true
