id: codex-secret-like-payload-redaction
runtime: codex
description: Codex prompt-bearing payload records only a redaction marker and no prompt or token-like value.
coverage_targets:
  - event_recognition
  - privacy_redaction
pressure_cases:
  - secret_like_payload_field
input_payload:
  hook_event_name: UserPromptSubmit
  event_id: codex-secret-like-payload-redaction
  prompt_text: SYNTHETIC_PROMPT_SHOULD_BE_IGNORED
  token: SYNTHETIC_TOKEN_SHOULD_BE_IGNORED
expected_normalized_event:
  adapter: codex
  event_kind: user_prompt_submit
  privacy_redaction:
    - "prompt_text:ignored"
expected_gate_result:
  outcome: pass
expected_evidence_delta:
  normalized_event_supported: true
  privacy_redaction_count: 1
expected_closure_effect:
  verdict: needs_validation
privacy_expectations:
  redactions_include:
    - "prompt_text:ignored"
  blocked_strings:
    - SYNTHETIC_PROMPT_SHOULD_BE_IGNORED
    - SYNTHETIC_TOKEN_SHOULD_BE_IGNORED
  forbid_absolute_paths: true
