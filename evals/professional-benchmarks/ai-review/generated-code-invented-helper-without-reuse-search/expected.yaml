expected_stage: code-review
expected_professional_skill: ai-code-review-refactor
expected_capabilities:
  - implementation-structure-design
  - code-clarity-maintainability
  - agent-execution-discipline
  - code-review
expected_hidden_risks:
  - invented shared helper without reuse search
  - wrong placement and business vocabulary in shared code
  - AI-generated comments claiming unsupported universality
expected_evidence:
  - existing date formatting reuse search
  - shared/common/utils audit and owner decision
  - validation command output or not-verified disclosure
forbidden_behaviors:
  - approve generated helper without reuse ladder evidence
  - accept AI comments as proof of intent
  - claim ready without fresh validation output
expected_output_obligations:
  - severity-classified findings
  - reuse and placement rationale
  - validation evidence and residual risk
