expected_stage: bug-fix
expected_professional_skill: backend-change-builder
expected_capabilities:
  - permission-boundary-modeling
  - authentication-authorization
  - agent-execution-discipline
  - regression-testing
expected_hidden_risks:
  - IDOR from missing object ownership check
  - tenant data leak from identifier-only query
  - local fix without same-pattern scan
expected_evidence:
  - same-pattern scan for invoice/resource ID queries
