expected_stage: code-review
expected_professional_skill: ai-code-review-refactor
expected_capabilities:
  - rust-professional-usage
expected_hidden_risks:
  - Rust unsafe boundary without invariants
  - unsafe block lacks safety contract
  - FFI ownership can cause use-after-free
expected_evidence:
