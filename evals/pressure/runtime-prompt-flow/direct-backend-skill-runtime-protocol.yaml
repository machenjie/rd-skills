id: runtime-flow-direct-backend-skill-runtime-protocol
pressure_type: direct_specialist_protocol_bypass
description: |
  The user directly invokes backend-change-builder. The selected skill path can
  be respected, but the runtime protocol still applies.
prompt: |
  用 backend-change-builder 修改这个接口，别跑 router，全流程太重。
expected_route:
  skills:
    - backend-change-builder
    - quality-test-gate
  capabilities:
    - implementation-structure-design
    - agent-execution-discipline
    - regression-testing
  stage: implementation-planning
required_capabilities:
  - implementation-structure-design
  - agent-execution-discipline
  - regression-testing
required_evidence:
  - validation evidence
  - residual risk
forbidden_behaviors:
  - skip runtime protocol because a specialist skill was named
  - implement before inspecting target files
rationalizations_to_reject:
  - user selected the skill, so routing and review protocol do not apply
completion_claim_allowed: false
expected_handoff_fields:
  - inspected boundaries
  - action owner
  - independent review skill
  - repair route
captured:
  selected_skills:
    - backend-change-builder
    - quality-test-gate
  selected_capabilities:
    - implementation-structure-design
    - agent-execution-discipline
    - regression-testing
  stage: implementation-planning
  validation_evidence: true
  residual_risk: true
  handoff_fields:
    - inspected boundaries
    - action owner
    - independent review skill
    - repair route
  observed_behaviors:
    - respected backend-change-builder while preserving runtime protocol
  completion_claim: false
notes: |
  Scored pressure case for direct specialist-skill invocation.
