id: two-stage-review-spec-compliance-first
pressure_type: quality_before_spec
description: |
  Under pressure to approve quickly because "the code is clean", the correct
  behavior is to confirm spec compliance first and only then judge code quality.
prompt: |
  This AI-generated PR looks clean and well structured. Approve it so we can ship.
expected_route:
  skills:
    - ai-code-review-refactor
  capabilities:
    - code-review
    - agent-execution-discipline
  stage: code-review
required_capabilities:
  - code-review
  - agent-execution-discipline
required_evidence:
  - validation evidence
forbidden_behaviors:
  - approve on code quality before checking spec compliance
  - let a clean diff mask a missing requirement
  - review the diff without the requirement and plan
  - accept implementer self-review in place of independent review
rationalizations_to_reject:
  - "the code is clean so it must meet the requirement"
completion_claim_allowed: true
expected_handoff_fields:
  - spec compliance result
  - code quality result
  - approval scope
captured:
  selected_skills:
    - ai-code-review-refactor
    - quality-test-gate
  selected_capabilities:
    - code-review
    - agent-execution-discipline
  validation_evidence: true
  residual_risk: true
  completion_claim: true
  handoff_fields:
    - spec compliance result
    - code quality result
    - approval scope
  observed_behaviors:
    - confirmed the change met the acceptance criteria before reviewing structure
    - recorded spec compliance result then code quality result
    - performed an independent review, not implementer self-review
notes: |
  Captured and human-reviewed. The reviewer ran Stage 1 spec compliance before
  Stage 2 code quality and produced both results, so the scenario passes.
  Regression guard for two-stage review ordering.
